services:
  api:
    build:
      context: .
      dockerfile: Vanilla.Api/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: Server=sqlserver,1433;Database=VanillaApp;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:${API_PORT:-12345}:8080"
    networks:
      - edge
      - backend

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend
    volumes:
      - sqlserver-data:/var/opt/mssql

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  sqlserver-data:
