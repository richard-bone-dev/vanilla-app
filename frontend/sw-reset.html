<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Service Worker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        background: #0b0d12;
        color: #f4f7fb;
        display: grid;
        margin: 0;
        min-height: 100dvh;
        padding: 1rem;
      }

      main {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        margin: 0 auto;
        max-width: 34rem;
        padding: 1.25rem;
      }

      p {
        color: #8d96a7;
        line-height: 1.5;
      }

      a {
        color: #4fd4dc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Service worker reset</h1>
      <p id="status">Checking for old service workers...</p>
      <p><a href="./index.html">Open the demo</a></p>
    </main>
    <script>
      (async () => {
        const status = document.querySelector("#status");

        if (!("serviceWorker" in navigator)) {
          status.textContent = "This browser has no service worker support active for this page.";
          return;
        }

        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
          status.textContent = registrations.length
            ? "Old service worker registrations were removed. Hard reload the demo page."
            : "No service worker registrations were found.";
        } catch (error) {
          status.textContent = `Could not unregister automatically: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
